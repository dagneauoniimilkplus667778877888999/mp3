<!DOCTYPE html>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      font-family: sans-serif;
      color: white;
      overflow: hidden;
    }

    #container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    #player {
      flex: 3;
      position: relative;
    }

    #playlist {
      flex: 1;
      background: #111;
      overflow-y: auto;
      padding: 10px;
    }

    #playlist ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #playlist li {
      display: flex;
      align-items: center;
      padding: 10px;
      cursor: pointer;
      border-bottom: 1px solid #222;
    }

    #playlist li:hover {
      background: #222;
    }

    #playlist li.active {
      background: #333;
      font-weight: bold;
    }

    #playlist img {
      width: 80px;
      height: 45px;
      object-fit: cover;
      margin-right: 10px;
    }

    #playlist span {
      flex: 1;
    }
  </style>
</head>

    let player;
    let currentIndex = 0;

    window.onYouTubeIframeAPIReady = function () {

      player = new YT.Player('player', {
        width: '100%',
        height: '100%',
        videoId: playlist[currentIndex].id,
        playerVars: {
          autoplay: 1,
          controls: 1,
          modestbranding: 1,
          rel: 0
        },
        events: {
          onStateChange: onPlayerStateChange
        }
      });

      buildPlaylistUI();
    };

    function buildPlaylistUI() {
      const ul = document.getElementById("videoList");
      ul.innerHTML = "";

      playlist.forEach((video, index) => {
        const li = document.createElement("li");

        const img = document.createElement("img");
        img.src = `https://img.youtube.com/vi/${video.id}/hqdefault.jpg`;

        const span = document.createElement("span");
        span.textContent = video.title;

        li.appendChild(img);
        li.appendChild(span);

        li.onclick = () => playVideo(index);

        if (index === currentIndex) li.classList.add("active");

        ul.appendChild(li);
      });
    }

    function playVideo(index) {
      currentIndex = index;
      player.loadVideoById(playlist[currentIndex].id);
      updateActive();
    }

    function updateActive() {
      document.querySelectorAll("#videoList li")
        .forEach((li, idx) => {
          li.classList.toggle("active", idx === currentIndex);
        });
    }

    function onPlayerStateChange(event) {
      console.log("Player state:", event.data);

      if (event.data === YT.PlayerState.ENDED) {
        setTimeout(() => {
          currentIndex = (currentIndex + 1) % playlist.length;
          player.loadVideoById(playlist[currentIndex].id);
          updateActive();
        }, 500);
      }
    }
